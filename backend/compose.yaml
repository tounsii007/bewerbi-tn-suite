services:
  postgres:
    image: postgres:16-alpine
    container_name: bewerbi-postgres
    environment:
      POSTGRES_USER: bewerbi
      POSTGRES_PASSWORD: bewerbi_dev
      POSTGRES_DB: bewerbi
    command: >
      postgres
      -c log_statement=none
      -c max_connections=200
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bewerbi"]
      interval: 5s

  redis:
    image: redis:7.4-alpine
    container_name: bewerbi-redis
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  mailhog:
    image: mailhog/mailhog:latest
    container_name: bewerbi-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: bewerbi-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: bewerbi-cluster-id-0001
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s

  # Optional: tracing backend for OpenTelemetry spans produced by services
  jaeger:
    image: jaegertracing/all-in-one:1.64
    container_name: bewerbi-jaeger
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP

volumes:
  postgres_data:
