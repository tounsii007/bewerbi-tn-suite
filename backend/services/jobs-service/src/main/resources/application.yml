spring:
  application:
    name: jobs-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bewerbi?currentSchema=jobs}
    username: ${DB_USER:bewerbi}
    password: ${DB_PASSWORD:bewerbi_dev}
  jpa:
    hibernate.ddl-auto: validate
    properties.hibernate.default_schema: jobs
    open-in-view: false
  flyway:
    enabled: true
    default-schema: jobs
    schemas: jobs
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    # Listener-only — used by UserDeletedListener (Iter 87) for the
    # GDPR cascade on saved-searches.
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: jobs-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest

server:
  port: ${SERVER_PORT:8082}

bewerbi:
  security:
    jwt:
      secret: ${JWT_SECRET:a-dev-only-shared-jwt-secret-change-me-in-production-256-bit}
  clients:
    i18n-service:
      base-url: ${I18N_SERVICE_URL:http://localhost:8181}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
