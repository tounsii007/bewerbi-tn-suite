spring:
  application:
    name: identity-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bewerbi?currentSchema=identity}
    username: ${DB_USER:bewerbi}
    password: ${DB_PASSWORD:bewerbi_dev}
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.default_schema: identity
      hibernate.format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    default-schema: identity
    schemas: identity
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        acks: all

server:
  port: ${SERVER_PORT:8081}

bewerbi:
  security:
    jwt:
      # Iter 107: RS256. identity-service is the sole signer — both keys
      # mounted. Prod override: JWT_PRIVATE_KEY_PATH/JWT_PUBLIC_KEY_PATH
      # via env, pointing at K8s/secret-store-managed mounts.
      private-key-path: ${JWT_PRIVATE_KEY_PATH:classpath:dev-keys/jwt-private.pem}
      public-key-path:  ${JWT_PUBLIC_KEY_PATH:classpath:dev-keys/jwt-public.pem}
      key-id:           ${JWT_KEY_ID:bewerbi-dev}
      access-ttl-minutes: 60
      refresh-ttl-days: 30
      issuer: bewerbi.tn
    # Iter 160 — Google OAuth (ID-token sign-in).
    # Left empty in dev so the bean stays unloaded and /auth/google
    # returns 503 with `error.auth.google.disabled` until an OAuth
    # client is provisioned in Google Cloud Console. In prod, set
    # GOOGLE_OAUTH_CLIENT_ID to the web-app OAuth-2.0 client ID;
    # the same value is published to the web bundle for client init.
    google:
      client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
  clients:
    i18n-service:
      base-url: ${I18N_SERVICE_URL:http://localhost:8181}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

logging:
  level:
    tn.bewerbi: DEBUG
