spring:
  application.name: companies-service
  threads.virtual.enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bewerbi?currentSchema=companies}
    username: ${DB_USER:bewerbi}
    password: ${DB_PASSWORD:bewerbi_dev}
  jpa:
    hibernate.ddl-auto: validate
    properties.hibernate.default_schema: companies
    open-in-view: false
  flyway:
    enabled: true
    default-schema: companies
    schemas: companies
    locations: classpath:db/migration
  data.redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  kafka:
    # Iter 87: GDPR cascade listens to USER_DELETED to anonymise the
    # user's reviews (content stays, author link replaced).
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: companies-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest

server.port: ${SERVER_PORT:8084}

bewerbi:
  security.jwt.public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:dev-keys/jwt-public.pem}
  clients.i18n-service.base-url: ${I18N_SERVICE_URL:http://localhost:8181}

springdoc:
  api-docs.path: /v3/api-docs
  swagger-ui.path: /swagger-ui
