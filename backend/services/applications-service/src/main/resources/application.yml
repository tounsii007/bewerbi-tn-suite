spring:
  application:
    name: applications-service
  threads.virtual.enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bewerbi?currentSchema=applications}
    username: ${DB_USER:bewerbi}
    password: ${DB_PASSWORD:bewerbi_dev}
  jpa:
    hibernate.ddl-auto: validate
    properties.hibernate.default_schema: applications
    open-in-view: false
  flyway:
    enabled: true
    default-schema: applications
    schemas: applications
    locations: classpath:db/migration
  data.redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        acks: all
    consumer:
      # Required for the USER_DELETED listener (Iter 85). Consumer
      # group is service-scoped so identity-service can fan-out to
      # every cascade-handler in parallel.
      group-id: applications-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest

server:
  port: ${SERVER_PORT:8083}

bewerbi:
  security.jwt.public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:dev-keys/jwt-public.pem}
  clients.i18n-service.base-url: ${I18N_SERVICE_URL:http://localhost:8181}

springdoc:
  api-docs.path: /v3/api-docs
  swagger-ui.path: /swagger-ui
