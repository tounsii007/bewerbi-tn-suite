spring:
  application.name: immigration-service
  threads.virtual.enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bewerbi?currentSchema=immigration}
    username: ${DB_USER:bewerbi}
    password: ${DB_PASSWORD:bewerbi_dev}
  jpa:
    hibernate.ddl-auto: validate
    properties.hibernate.default_schema: immigration
    open-in-view: false
  flyway:
    enabled: true
    default-schema: immigration
    schemas: immigration
    locations: classpath:db/migration
  data.redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}

server.port: ${SERVER_PORT:8085}

bewerbi:
  security.jwt.secret: ${JWT_SECRET:a-dev-only-shared-jwt-secret-change-me-in-production-256-bit}
  clients.i18n-service.base-url: ${I18N_SERVICE_URL:http://localhost:8181}

springdoc:
  api-docs.path: /v3/api-docs
  swagger-ui.path: /swagger-ui
