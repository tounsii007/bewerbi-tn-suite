spring:
  application.name: documents-service
  threads.virtual.enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bewerbi?currentSchema=documents}
    username: ${DB_USER:bewerbi}
    password: ${DB_PASSWORD:bewerbi_dev}
  jpa:
    hibernate.ddl-auto: validate
    properties.hibernate.default_schema: documents
    open-in-view: false
  flyway:
    enabled: true
    default-schema: documents
    schemas: documents
    locations: classpath:db/migration
  servlet.multipart:
    max-file-size: 10MB
    max-request-size: 15MB
  kafka:
    # Listener-only client — we don't currently publish from documents-
    # service. Wired in Iter 86 for the USER_DELETED cascade.
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: documents-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest

server.port: ${SERVER_PORT:8086}

bewerbi:
  security.jwt.public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:dev-keys/jwt-public.pem}
  upload.root: ${UPLOAD_ROOT:./var/uploads}
  documents:
    # Iter 109 — Critical #3 fix.
    # `filesystem` (default) keeps local dev zero-config: blobs live
    # under bewerbi.upload.root just like before. Set this to `s3` in
    # prod, point the keys below at the bucket and a customer-managed
    # KMS key, and CVs / passports become encrypted-at-rest by the
    # platform instead of relying on host-level dm-crypt.
    storage: ${DOCUMENTS_STORAGE:filesystem}
    s3:
      bucket: ${DOCUMENTS_S3_BUCKET:}
      region: ${DOCUMENTS_S3_REGION:eu-central-1}
      # Override only for MinIO / non-AWS S3 (e.g. http://minio:9000).
      endpoint: ${DOCUMENTS_S3_ENDPOINT:}
      # Both blank → fall back to the default AWS credentials chain
      # (IRSA on EKS, ECS task role, env, ~/.aws/credentials).
      access-key: ${DOCUMENTS_S3_ACCESS_KEY:}
      secret-key: ${DOCUMENTS_S3_SECRET_KEY:}
      # Blank → SSE-S3 (AES256). Set to a KMS key ARN/alias → SSE-KMS,
      # which is the audit-defensible option (rotated DEKs wrapped by
      # a customer-managed master key).
      kms-key-id: ${DOCUMENTS_S3_KMS_KEY_ID:}

springdoc:
  api-docs.path: /v3/api-docs
  swagger-ui.path: /swagger-ui
