spring:
  application:
    name: gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      default-filters:
        - name: DedupeResponseHeader
          args:
            name: Access-Control-Allow-Credentials Access-Control-Allow-Origin
            strategy: RETAIN_UNIQUE
        # Global rate-limit: 60 requests/second/user, burst 120
        - name: RequestRateLimiter
          args:
            key-resolver: "#{@userKeyResolver}"
            redis-rate-limiter.replenishRate: 60
            redis-rate-limiter.burstCapacity: 120
            redis-rate-limiter.requestedTokens: 1
      globalcors:
        cors-configurations:
          "[/**]":
            # NOTE: with allowCredentials=true the wildcard "*" is invalid
            # both for origins and headers — browsers reject the response.
            # We override the patterns from CORS_ALLOWED_ORIGINS in prod so
            # the same artifact serves dev (localhost) and staging/prod
            # (the real origins) without code changes.
            allowedOriginPatterns: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
            allowedMethods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
            # Explicit allow-list instead of "*" — the prior wildcard
            # would have been silently ignored by browsers when
            # allowCredentials=true, but it also tells static security
            # scanners "this app permits anything", which is misleading.
            allowedHeaders:
              - Authorization
              - Content-Type
              - Accept
              - Accept-Language
              - X-Requested-With
              - X-Idempotency-Key
              - X-Trace-Id
            allowCredentials: true
            maxAge: 3600
            exposedHeaders: ["Content-Language", "X-Trace-Id"]
      routes:
        - id: auth-strict
          # Tighter bucket for the attack-sensitive auth endpoints.
          # password/forgot is rate-limited harder so an attacker cannot
          # flood the inbox of a known address or use the email-send path
          # for amplification.
          # password/change is also in here even though it's authenticated:
          # a stolen access token could otherwise rotate the password
          # without limit; this caps that to 5/s.
          uri: ${routes.identity-service:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/login,/api/v1/auth/register,/api/v1/auth/refresh,/api/v1/auth/password/forgot,/api/v1/auth/password/reset,/api/v1/auth/password/change,/api/v1/auth/verify-email/resend,/api/v1/auth/me/delete
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
        - id: identity
          uri: ${routes.identity-service:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**,/api/v1/profile/**
        - id: i18n
          uri: ${routes.i18n-service:http://localhost:8181}
          predicates:
            - Path=/api/v1/i18n/**,/api/v1/professions/**,/api/v1/reference-data/**,/api/v1/admin/i18n/**
        - id: jobs
          uri: ${routes.jobs-service:http://localhost:8082}
          predicates:
            - Path=/api/v1/jobs/**,/api/v1/saved-searches/**,/api/v1/salary-market/**
        - id: applications
          uri: ${routes.applications-service:http://localhost:8083}
          predicates:
            - Path=/api/v1/applications/**,/api/v1/favorites/**
        - id: companies
          uri: ${routes.companies-service:http://localhost:8084}
          predicates:
            - Path=/api/v1/companies/**
        - id: immigration
          uri: ${routes.immigration-service:http://localhost:8085}
          predicates:
            - Path=/api/v1/anerkennung/**,/api/v1/visa/**
        - id: documents
          uri: ${routes.documents-service:http://localhost:8086}
          predicates:
            - Path=/api/v1/documents/**,/api/v1/cv/**
        - id: matching
          uri: ${routes.matching-service:http://localhost:8087}
          predicates:
            - Path=/api/v1/matching/**
        - id: notification
          uri: ${routes.notification-service:http://localhost:8088}
          predicates:
            - Path=/api/v1/notifications/**

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: native
  # Cap individual HTTP exchanges. The documents-service upload route
  # already runs through a dedicated multipart filter, so 2 MB on the
  # gateway is plenty for every other endpoint (login/register/etc).
  # Without this, Netty defaults to unbounded which is a slow-loris and
  # memory-pressure vector.
  max-http-request-header-size: 16KB
  netty:
    max-initial-line-length: 8KB
    max-header-size: 16KB
    h2c-max-content-length: 2MB

bewerbi:
  security:
    jwt:
      secret: ${JWT_SECRET:a-dev-only-shared-jwt-secret-change-me-in-production-256-bit}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    gateway:
      enabled: true
    health:
      probes:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 60
        waitDurationInOpenState: 10s
  timelimiter:
    instances:
      default:
        timeoutDuration: 5s

logging:
  level:
    org.springframework.cloud.gateway: INFO
