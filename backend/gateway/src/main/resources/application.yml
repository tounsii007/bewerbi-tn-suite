spring:
  application:
    name: gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      default-filters:
        - name: DedupeResponseHeader
          args:
            name: Access-Control-Allow-Credentials Access-Control-Allow-Origin
            strategy: RETAIN_UNIQUE
        # Global rate-limit: 60 requests/second/user, burst 120
        - name: RequestRateLimiter
          args:
            key-resolver: "#{@userKeyResolver}"
            redis-rate-limiter.replenishRate: 60
            redis-rate-limiter.burstCapacity: 120
            redis-rate-limiter.requestedTokens: 1
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOriginPatterns:
              - "http://localhost:*"
              - "http://127.0.0.1:*"
            allowedMethods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
            allowedHeaders: ["*"]
            allowCredentials: true
            exposedHeaders: ["Content-Language"]
      routes:
        - id: auth-strict
          # Tighter bucket for the attack-sensitive auth endpoints
          uri: ${routes.identity-service:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/login,/api/v1/auth/register,/api/v1/auth/refresh
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
        - id: identity
          uri: ${routes.identity-service:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**,/api/v1/profile/**
        - id: i18n
          uri: ${routes.i18n-service:http://localhost:8181}
          predicates:
            - Path=/api/v1/i18n/**,/api/v1/professions/**,/api/v1/reference-data/**,/api/v1/admin/i18n/**
        - id: jobs
          uri: ${routes.jobs-service:http://localhost:8082}
          predicates:
            - Path=/api/v1/jobs/**,/api/v1/saved-searches/**,/api/v1/salary-market/**
        - id: applications
          uri: ${routes.applications-service:http://localhost:8083}
          predicates:
            - Path=/api/v1/applications/**,/api/v1/favorites/**
        - id: companies
          uri: ${routes.companies-service:http://localhost:8084}
          predicates:
            - Path=/api/v1/companies/**
        - id: immigration
          uri: ${routes.immigration-service:http://localhost:8085}
          predicates:
            - Path=/api/v1/anerkennung/**,/api/v1/visa/**
        - id: documents
          uri: ${routes.documents-service:http://localhost:8086}
          predicates:
            - Path=/api/v1/documents/**,/api/v1/cv/**
        - id: matching
          uri: ${routes.matching-service:http://localhost:8087}
          predicates:
            - Path=/api/v1/matching/**
        - id: notification
          uri: ${routes.notification-service:http://localhost:8088}
          predicates:
            - Path=/api/v1/notifications/**

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: native

bewerbi:
  security:
    jwt:
      secret: ${JWT_SECRET:a-dev-only-shared-jwt-secret-change-me-in-production-256-bit}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    gateway:
      enabled: true
    health:
      probes:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 60
        waitDurationInOpenState: 10s
  timelimiter:
    instances:
      default:
        timeoutDuration: 5s

logging:
  level:
    org.springframework.cloud.gateway: INFO
