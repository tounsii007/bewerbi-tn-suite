# Aggregated OpenAPI docs served at /docs and /v3/api-docs/swagger-config.
# Activate with: SPRING_PROFILES_ACTIVE=swagger
springdoc:
  swagger-ui:
    path: /docs
    urls:
      - name: identity
        url: http://localhost:8081/v3/api-docs
      - name: i18n
        url: http://localhost:8181/v3/api-docs
      - name: jobs
        url: http://localhost:8082/v3/api-docs
      - name: applications
        url: http://localhost:8083/v3/api-docs
      - name: companies
        url: http://localhost:8084/v3/api-docs
      - name: immigration
        url: http://localhost:8085/v3/api-docs
      - name: documents
        url: http://localhost:8086/v3/api-docs
      - name: matching
        url: http://localhost:8087/v3/api-docs
      - name: notification
        url: http://localhost:8088/v3/api-docs
