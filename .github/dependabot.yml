version: 2
updates:
  # All ecosystems set to open-pull-requests-limit: 0 — Dependabot
  # tracks updates internally but doesn't open PRs. Re-enable by
  # raising the limit back to 5 after the Actions billing situation
  # is resolved (the initial repo creation flooded the free tier with
  # 19 PRs × 5 workflows = ~2000 minutes of runs).

  - package-ecosystem: "npm"
    directory: "/web"
    schedule: { interval: "weekly", day: "monday" }
    open-pull-requests-limit: 0
    versioning-strategy: increase-if-necessary
    groups:
      next:        { patterns: ["next", "eslint-config-next"] }
      react:       { patterns: ["react", "react-dom", "@types/react*"] }
      radix:       { patterns: ["@radix-ui/*"] }
      tanstack:    { patterns: ["@tanstack/*"] }

  - package-ecosystem: "npm"
    directory: "/mobile"
    schedule: { interval: "weekly", day: "monday" }
    open-pull-requests-limit: 0
    versioning-strategy: increase-if-necessary
    groups:
      expo:        { patterns: ["expo", "expo-*"] }
      reanimated:  { patterns: ["react-native-reanimated", "react-native-gesture-handler"] }

  - package-ecosystem: "maven"
    directory: "/backend"
    schedule: { interval: "weekly", day: "tuesday" }
    open-pull-requests-limit: 0
    groups:
      spring:       { patterns: ["org.springframework*"] }
      spring-cloud: { patterns: ["org.springframework.cloud*"] }
      resilience4j: { patterns: ["io.github.resilience4j*"] }
      testcontainers: { patterns: ["org.testcontainers*"] }
    ignore:
      # Spring Boot 4.x has breaking API changes (HttpHeaders, test packages,
      # BOM no longer manages testcontainers junit-jupiter/postgresql).
      - dependency-name: "org.springframework.boot:spring-boot-starter-parent"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.springframework.boot:*"
        update-types: ["version-update:semver-major"]
      # Spring Cloud 2025.x bundles Spring Boot 4 — same migration blocker.
      - dependency-name: "org.springframework.cloud:*"
        update-types: ["version-update:semver-major"]
      # Testcontainers "2.x" property in pom referred to a wrong artifact —
      # auto-bumping broke the BOM. Pin to 1.x.
      - dependency-name: "org.testcontainers:testcontainers-bom"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 0

  - package-ecosystem: "docker"
    directory: "/backend"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 0
